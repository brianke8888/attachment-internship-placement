version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: placementhub-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-attachment_system}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  backend:
    build: .
    container_name: placementhub-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      DB_NAME: ${DB_NAME:-attachment_system}
      PORT: "5000"
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_random_secret}
      JWT_EXPIRES_IN: "7d"
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_SECURE: ${MAIL_SECURE:-false}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-"PlacementHub" <noreply@placementhub.local>}
    volumes:
      - uploads_data:/app/backend/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  uploads_data:
