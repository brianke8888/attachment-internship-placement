<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reset Password — PlacementHub</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <meta name="theme-color" content="#059669" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PlacementHub" />
  <script>if(localStorage.getItem('theme')==='dark'||(!localStorage.getItem('theme')&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark')</script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-hero">
      <div class="auth-hero-content">
        <div class="auth-brand">
          <div class="auth-brand-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          </div>
          <span class="auth-brand-name">PlacementHub</span>
        </div>
        <h1>Reset your<br/><span class="gradient">password</span></h1>
        <p class="lead">Choose a new password for your PlacementHub account.</p>
      </div>
    </div>
    <div class="auth-main">
      <div class="auth-card">
        <form id="reset-form">
          <h2 style="font-size:20px;font-weight:700;margin-bottom:4px;">New password</h2>
          <p class="muted text-sm" style="margin-bottom:20px;">Choose a new password (at least 6 characters).</p>
          <div class="form-group">
            <label class="form-label">New password</label>
            <input type="password" class="form-input" id="reset-password" required minlength="6" placeholder="At least 6 characters" />
          </div>
          <div class="form-group">
            <label class="form-label">Confirm password</label>
            <input type="password" class="form-input" id="reset-confirm" required minlength="6" placeholder="Repeat your password" />
          </div>
          <div id="reset-error"></div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="reset-btn">Reset Password</button>
        </form>
        <div id="reset-success" style="display:none;">
          <h2 style="font-size:20px;font-weight:700;margin-bottom:4px;">Password updated!</h2>
          <p class="muted text-sm" style="margin-bottom:20px;">You can now sign in with your new password.</p>
          <a href="auth.html" class="btn btn-primary btn-block btn-lg">Go to Sign In</a>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="js/reset-password.js"></script>
</body>
</html>
