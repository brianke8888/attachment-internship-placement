<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Student Dashboard — PlacementHub</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="icon" href="../icons/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="../icons/icon-192.svg" />
  <meta name="theme-color" content="#059669" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PlacementHub" />
  <script>if(localStorage.getItem('theme')==='dark'||(!localStorage.getItem('theme')&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark')</script>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="dash-wrap">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <div class="main-area">
      <header class="topbar" id="topbar"></header>
      <main class="main-content" id="content">
        <div class="loading-wrap"><div class="spinner spinner-lg"></div></div>
      </main>
    </div>
  </div>
  <script type="module" src="../js/student.js"></script>
</body>
</html>
